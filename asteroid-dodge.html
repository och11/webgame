<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asteroid Dodge</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon: #00ffe7;
      --danger: #ff3f5b;
      --gold: #ffd700;
      --bg: #020c1b;
      --panel: rgba(0,255,231,0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--neon);
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* starfield */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.3) 0%, transparent 100%);
      pointer-events: none;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon);
      margin-bottom: 0.5rem;
      position: relative; z-index: 2;
    }

    .hud {
      display: flex; gap: 3rem; margin-bottom: 0.8rem;
      position: relative; z-index: 2;
    }
    .hud-item { text-align: center; }
    .hud-label { font-size: 0.65rem; letter-spacing: 0.2em; color: rgba(0,255,231,0.5); }
    .hud-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem; font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 10px var(--gold);
    }

    #gameCanvas {
      border: 1px solid rgba(0,255,231,0.3);
      box-shadow: 0 0 30px rgba(0,255,231,0.15), inset 0 0 60px rgba(0,0,0,0.5);
      display: block;
      position: relative; z-index: 2;
      cursor: none;
    }

    .controls-hint {
      margin-top: 0.8rem;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: rgba(0,255,231,0.4);
      position: relative; z-index: 2;
    }

    /* Overlay screens */
    #overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      background: rgba(2,12,27,0.92);
      border: 1px solid rgba(0,255,231,0.3);
      padding: 2.5rem 3.5rem;
      box-shadow: 0 0 40px rgba(0,255,231,0.1);
    }
    #overlay h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem; font-weight: 900;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    #overlay .sub { color: rgba(0,255,231,0.6); font-size: 0.85rem; margin-bottom: 1.5rem; line-height: 1.6; }
    #overlay .final-score { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: var(--gold); text-shadow: 0 0 15px var(--gold); margin: 0.5rem 0 1.5rem; }

    #startBtn {
      background: transparent;
      border: 2px solid var(--neon);
      color: var(--neon);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem; font-weight: 700;
      letter-spacing: 0.2em;
      padding: 0.8rem 2.5rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #startBtn:hover {
      background: rgba(0,255,231,0.1);
      box-shadow: 0 0 20px rgba(0,255,231,0.4);
    }

    .canvas-wrap { position: relative; z-index: 2; }
  </style>
</head>
<body>

  <h1>☄ ASTEROID DODGE</h1>

  <div class="hud">
    <div class="hud-item">
      <div class="hud-label">SCORE</div>
      <div class="hud-value" id="scoreDisplay">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">LEVEL</div>
      <div class="hud-value" id="levelDisplay">1</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">LIVES</div>
      <div class="hud-value" id="livesDisplay">♥ ♥ ♥</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">BEST</div>
      <div class="hud-value" id="bestDisplay">0</div>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="520" height="580"></canvas>

    <div id="overlay">
      <h2 style="color:var(--neon); text-shadow: 0 0 20px var(--neon);">ASTEROID DODGE</h2>
      <div class="sub">
        Pilot your ship through an asteroid field.<br>
        Dodge rocks, collect stars, survive as long as you can!<br><br>
        🖱 <b>Mouse</b> or <b>Arrow Keys</b> to move &nbsp;|&nbsp; <b>Space</b> to shoot
      </div>
      <button id="startBtn" onclick="startGame()">LAUNCH MISSION</button>
    </div>
  </div>

  <div class="controls-hint">MOUSE / ARROW KEYS — MOVE &nbsp;|&nbsp; SPACE — SHOOT LASER</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

const W = canvas.width, H = canvas.height;

// Game state
let state = 'idle'; // idle, playing, dead
let score = 0, level = 1, lives = 3, bestScore = 0;
let frameCount = 0;

// Player
const player = {
  x: W / 2, y: H - 80,
  w: 28, h: 36,
  speed: 5,
  invincible: 0,
  trail: []
};

// Collections
let asteroids = [], stars = [], lasers = [], particles = [], powerups = [];

// Input
const keys = {};
let mouseX = player.x, mouseY = player.y;
let usesMouse = false;

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
  usesMouse = true;
});

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); shootLaser(); }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) { usesMouse = false; e.preventDefault(); }
});
document.addEventListener('keyup', e => keys[e.code] = false);

canvas.addEventListener('click', () => { if (state === 'playing') shootLaser(); });

// ── Helpers ──
function rand(a, b) { return Math.random() * (b - a) + a; }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }

function spawnAsteroid() {
  const size = rand(18, 38 + level * 3);
  const x = rand(size, W - size);
  const speedBase = 1.2 + level * 0.35;
  asteroids.push({
    x, y: -size,
    size,
    vx: rand(-1.2, 1.2),
    vy: rand(speedBase, speedBase + 1.8),
    rot: 0,
    rotSpeed: rand(-0.04, 0.04),
    sides: randInt(6, 10),
    hp: size > 28 ? 2 : 1,
    color: `hsl(${rand(10,40)}, 60%, ${rand(35,55)}%)`
  });
}

function spawnStar() {
  stars.push({ x: rand(10, W - 10), y: -10, vy: rand(2, 4), size: rand(5, 10), pulse: 0 });
}

function spawnPowerup() {
  powerups.push({ x: rand(20, W - 20), y: -15, vy: 1.8, type: 'shield', pulse: 0 });
}

function shootLaser() {
  if (state !== 'playing') return;
  lasers.push({ x: player.x, y: player.y - player.h / 2, vy: -12 });
  // tiny recoil particles
  for (let i = 0; i < 4; i++) {
    particles.push({ x: player.x, y: player.y - 10, vx: rand(-1,1), vy: rand(1,3), life: 15, color: '#00ffe7', size: 2 });
  }
}

function explode(x, y, color, count = 14) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + rand(-0.3, 0.3);
    const speed = rand(1.5, 5);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: rand(25, 50),
      maxLife: 50,
      color,
      size: rand(2, 5)
    });
  }
}

function drawShip(x, y, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);

  // engine glow
  if (frameCount % 6 < 3) {
    const grad = ctx.createRadialGradient(0, 18, 0, 0, 18, 16);
    grad.addColorStop(0, 'rgba(0,200,255,0.8)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 20, 8, 14, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // ship body
  ctx.fillStyle = '#c0e8ff';
  ctx.strokeStyle = '#00ffe7';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.lineTo(14, 16);
  ctx.lineTo(6, 10);
  ctx.lineTo(-6, 10);
  ctx.lineTo(-14, 16);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // cockpit
  ctx.fillStyle = '#00ffe7';
  ctx.beginPath();
  ctx.ellipse(0, -4, 5, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // shield ring
  if (player.invincible > 0) {
    ctx.strokeStyle = `rgba(0,255,231,${0.3 + 0.4 * Math.sin(frameCount * 0.2)})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 28, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.rot);
  ctx.beginPath();
  for (let i = 0; i < a.sides; i++) {
    const angle = (Math.PI * 2 / a.sides) * i;
    const r = a.size * (0.8 + 0.2 * Math.sin(i * 3.7));
    const px = Math.cos(angle) * r;
    const py = Math.sin(angle) * r;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = a.color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,200,100,0.4)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // crack on damaged asteroids
  if (a.hp === 1 && a.size > 28) {
    ctx.strokeStyle = 'rgba(255,100,50,0.8)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-a.size * 0.3, -a.size * 0.2);
    ctx.lineTo(a.size * 0.2, a.size * 0.3);
    ctx.stroke();
  }
  ctx.restore();
}

function drawStar(s) {
  s.pulse += 0.08;
  const glow = 0.6 + 0.4 * Math.sin(s.pulse);
  ctx.save();
  ctx.translate(s.x, s.y);
  // star shape
  ctx.fillStyle = `rgba(255,215,0,${glow})`;
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const outerAngle = (Math.PI * 2 / 5) * i - Math.PI / 2;
    const innerAngle = outerAngle + Math.PI / 5;
    const ox = Math.cos(outerAngle) * s.size;
    const oy = Math.sin(outerAngle) * s.size;
    const ix = Math.cos(innerAngle) * s.size * 0.4;
    const iy = Math.sin(innerAngle) * s.size * 0.4;
    i === 0 ? ctx.moveTo(ox, oy) : ctx.lineTo(ox, oy);
    ctx.lineTo(ix, iy);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function update() {
  frameCount++;

  // Player movement
  if (usesMouse) {
    const dx = mouseX - player.x, dy = mouseY - player.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 3) {
      player.x += (dx / dist) * Math.min(dist, player.speed * 1.5);
      player.y += (dy / dist) * Math.min(dist, player.speed * 1.5);
    }
  } else {
    if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
    if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
    if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
  }
  player.x = Math.max(player.w, Math.min(W - player.w, player.x));
  player.y = Math.max(player.h, Math.min(H - 20, player.y));

  // Trail
  player.trail.push({ x: player.x, y: player.y });
  if (player.trail.length > 10) player.trail.shift();

  if (player.invincible > 0) player.invincible--;

  // Spawn
  if (frameCount % Math.max(28 - level * 2, 12) === 0) spawnAsteroid();
  if (frameCount % 120 === 0) spawnStar();
  if (frameCount % 400 === 0) spawnPowerup();

  // Level up
  level = 1 + Math.floor(score / 300);

  // Score over time
  if (frameCount % 30 === 0) score += level;

  // Lasers
  lasers.forEach(l => l.y += l.vy);
  lasers = lasers.filter(l => l.y > -10);

  // Asteroids
  asteroids.forEach(a => {
    a.x += a.vx; a.y += a.vy; a.rot += a.rotSpeed;
  });

  // Stars
  stars.forEach(s => s.y += s.vy);
  stars = stars.filter(s => s.y < H + 20);

  // Powerups
  powerups.forEach(p => p.y += p.vy);
  powerups = powerups.filter(p => p.y < H + 20);

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; p.vy += 0.08; });
  particles = particles.filter(p => p.life > 0);

  // Laser vs asteroid collision
  lasers.forEach((laser, li) => {
    asteroids.forEach((a, ai) => {
      const dx = laser.x - a.x, dy = laser.y - a.y;
      if (Math.sqrt(dx * dx + dy * dy) < a.size) {
        a.hp--;
        if (a.hp <= 0) {
          explode(a.x, a.y, a.color, 16);
          score += Math.floor(a.size);
          asteroids.splice(ai, 1);
        } else {
          explode(a.x, a.y, '#ff8800', 6);
        }
        lasers.splice(li, 1);
      }
    });
  });

  // Player vs asteroid
  if (player.invincible === 0) {
    asteroids.forEach((a, ai) => {
      const dx = player.x - a.x, dy = player.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < a.size + 12) {
        explode(a.x, a.y, '#ff3f5b', 20);
        asteroids.splice(ai, 1);
        lives--;
        player.invincible = 120;
        updateHUD();
        if (lives <= 0) gameOver();
      }
    });
  }

  // Player vs star
  stars.forEach((s, si) => {
    const dx = player.x - s.x, dy = player.y - s.y;
    if (Math.sqrt(dx * dx + dy * dy) < s.size + 14) {
      explode(s.x, s.y, '#ffd700', 10);
      score += 50;
      stars.splice(si, 1);
    }
  });

  // Player vs powerup
  powerups.forEach((p, pi) => {
    const dx = player.x - p.x, dy = player.y - p.y;
    if (Math.sqrt(dx * dx + dy * dy) < 22) {
      player.invincible = 200;
      explode(p.x, p.y, '#00ffe7', 12);
      powerups.splice(pi, 1);
    }
  });

  // Clean off-screen
  asteroids = asteroids.filter(a => a.y < H + 60 && a.x > -60 && a.x < W + 60);
  updateHUD();
}

function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('levelDisplay').textContent = level;
  document.getElementById('livesDisplay').textContent = '♥ '.repeat(Math.max(0, lives)).trim();
  document.getElementById('bestDisplay').textContent = bestScore;
}

function draw() {
  // Background
  ctx.fillStyle = 'rgba(2,12,27,0.88)';
  ctx.fillRect(0, 0, W, H);

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(0,255,231,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Player trail
  player.trail.forEach((t, i) => {
    ctx.fillStyle = `rgba(0,255,231,${(i / player.trail.length) * 0.15})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 4 * (i / player.trail.length), 0, Math.PI * 2);
    ctx.fill();
  });

  // Lasers
  lasers.forEach(l => {
    ctx.save();
    ctx.shadowColor = '#00ffe7';
    ctx.shadowBlur = 8;
    ctx.strokeStyle = '#00ffe7';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(l.x, l.y);
    ctx.lineTo(l.x, l.y + 16);
    ctx.stroke();
    ctx.restore();
  });

  // Stars (collectibles)
  stars.forEach(s => drawStar(s));

  // Powerups
  powerups.forEach(p => {
    p.pulse = (p.pulse || 0) + 0.06;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.pulse);
    ctx.strokeStyle = `rgba(0,255,231,${0.5 + 0.5 * Math.sin(p.pulse * 4)})`;
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00ffe7'; ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(0, 0, 12, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(0,255,231,0.15)';
    ctx.fill();
    ctx.fillStyle = '#00ffe7';
    ctx.font = '12px Share Tech Mono';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🛡', 0, 0);
    ctx.restore();
  });

  // Asteroids
  asteroids.forEach(a => drawAsteroid(a));

  // Particles
  particles.forEach(p => {
    const alpha = p.life / (p.maxLife || 40);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // Player ship
  const shipAlpha = player.invincible > 0 ? (Math.sin(frameCount * 0.3) * 0.5 + 0.5) : 1;
  drawShip(player.x, player.y, shipAlpha);
}

function gameLoop() {
  if (state !== 'playing') return;
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function startGame() {
  state = 'playing';
  score = 0; level = 1; lives = 3; frameCount = 0;
  player.x = W / 2; player.y = H - 80;
  player.invincible = 0; player.trail = [];
  asteroids = []; stars = []; lasers = []; particles = []; powerups = [];
  overlay.style.display = 'none';
  updateHUD();
  gameLoop();
}

function gameOver() {
  state = 'dead';
  if (score > bestScore) bestScore = score;
  updateHUD();

  overlay.style.display = 'block';
  overlay.innerHTML = `
    <h2 style="color:var(--danger); text-shadow: 0 0 20px var(--danger);">SHIP DESTROYED</h2>
    <div class="sub">Your spacecraft didn't survive the asteroid field.</div>
    <div class="final-score">${score.toLocaleString()} PTS</div>
    <div class="sub" style="margin-bottom:1rem;">Best: <span style="color:var(--gold)">${bestScore.toLocaleString()}</span></div>
    <button id="startBtn" onclick="startGame()">TRY AGAIN</button>
  `;
}

// Initial idle draw
ctx.fillStyle = '#020c1b';
ctx.fillRect(0, 0, W, H);
</script>
</body>
</html>
